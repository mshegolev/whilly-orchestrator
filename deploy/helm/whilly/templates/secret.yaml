{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "whilly.fullname" . }}-secrets
  labels:
    {{- include "whilly.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.secrets.keys.databaseUrl }}: {{ required "secrets.values.WHILLY_DATABASE_URL is required when secrets.create=true" .Values.secrets.values.WHILLY_DATABASE_URL | quote }}
  {{ .Values.secrets.keys.bootstrapToken }}: {{ required "secrets.values.WHILLY_WORKER_BOOTSTRAP_TOKEN is required when secrets.create=true" .Values.secrets.values.WHILLY_WORKER_BOOTSTRAP_TOKEN | quote }}
{{- end }}
{{- if .Values.imagePullSecret.create }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.imagePullSecret.name | default (printf "%s-pull" (include "whilly.fullname" .)) }}
  labels:
    {{- include "whilly.labels" . | nindent 4 }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ required "imagePullSecret.dockerconfigjson is required when imagePullSecret.create=true" .Values.imagePullSecret.dockerconfigjson }}
{{- end }}
