[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ralph-orchestrator"
version = "3.0.0"
description = "Ralph Wiggum task orchestrator — continuous AI agent loops with dashboard, decomposer, TRIZ analyzer and PRD wizard"
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "Mikhail Shchegolev", email = "mvschegole@mts.ru" }]
license = { text = "Proprietary" }
keywords = ["ralph", "llm", "orchestrator", "agent-loop", "qa"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Quality Assurance",
]
dependencies = [
    "rich>=13.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "ruff>=0.5",
    "mypy>=1.8",
]

[project.urls]
Homepage = "https://gitlab.services.mts.ru/einvy/autotests/qa_assistant"
Documentation = "https://gitlab.services.mts.ru/einvy/autotests/qa_assistant/-/blob/master/docs/Ralph-Usage.md"

[tool.setuptools]
packages = ["ralph"]
package-dir = { "ralph" = "." }

[tool.setuptools.package-data]
ralph = ["py.typed"]
