# Whilly production-image alembic config.
#
# Отличается от корневого `alembic.ini` двумя вещами:
#
# 1. `script_location` указывает АБСОЛЮТНЫМ путём в venv:
#    /opt/venv/lib/python3.12/site-packages/whilly/adapters/db/migrations
#
#    В корневом alembic.ini путь относительный (`whilly/adapters/db/migrations`)
#    + `prepend_sys_path = .`, который рассчитан на запуск из корня source-чекаута.
#    В production-образе исходников нет — есть только установленный пакет в venv.
#    Абсолютный путь убирает зависимость от WORKDIR и от прокладывания sys.path.
#
# 2. Нет `post_write_hooks` (ruff не установлен в production-образе и не должен).
#
# Версия Python зашита (3.12) — она же зафиксирована в Dockerfile через
# ARG PYTHON_VERSION=3.12. Если будете апгрейдить Python в Dockerfile —
# не забудьте поправить путь здесь.

[alembic]
script_location = /opt/venv/lib/python3.12/site-packages/whilly/adapters/db/migrations

# Резолвится из $WHILLY_DATABASE_URL в env.py — placeholder ниже нужен только
# чтобы `alembic --version` / `alembic check` не падали ДО того как env.py
# успеет переопределить значение.
sqlalchemy.url = postgresql+************************************************/placeholder

file_template = %%(rev)s_%%(slug)s
truncate_slug_length = 60
timezone = UTC
version_path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
