name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev deps
        run: pip install -e '.[dev]'
      - name: Ruff check and auto-fix
        run: |
          # 1. Первая проверка ruff check
          echo "🔍 Running ruff check..."
          if ruff check whilly/ tests/; then
            echo "✅ No linting issues found"
            LINT_CLEAN=true
          else
            echo "❌ Linting issues found. Attempting auto-fix..."
            LINT_CLEAN=false

            # Пробуем автофикс
            ruff check --fix whilly/ tests/ || true

            # Проверяем снова после автофикса
            echo "🔍 Re-checking after auto-fix..."
            if ruff check whilly/ tests/; then
              echo "✅ Auto-fix successful - no linting errors remain"
              AUTOFIX_SUCCESS=true
            else
              echo "❌ Some linting issues require manual attention"
              AUTOFIX_SUCCESS=false
            fi
          fi

          # 2. Проверка форматирования (всегда)
          echo "🎨 Checking code formatting..."
          if ruff format --check whilly/ tests/; then
            echo "✅ Code is properly formatted"
            FORMAT_CLEAN=true
          else
            echo "❌ Formatting issues found. Auto-fixing..."
            FORMAT_CLEAN=false
            ruff format whilly/ tests/
            echo "✅ Formatting applied"
          fi

          # 3. Финальная проверка и коммит (если были изменения)
          if [ "$LINT_CLEAN" = "true" ] && [ "$FORMAT_CLEAN" = "true" ]; then
            echo "🎉 All checks passed from the start!"
            exit 0
          fi

          # Настраиваем git для коммита
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          # Проверяем есть ли изменения для коммита
          if git diff --quiet; then
            echo "ℹ️  No changes to commit after auto-fixes"

            # Если автофикс не помог с линтингом, прерываем CI
            if [ "$AUTOFIX_SUCCESS" = "false" ]; then
              echo "💥 Manual intervention required for linting issues"
              exit 1
            fi
          else
            echo "📝 Committing auto-fixes..."

            # Финальная проверка что все чисто после наших изменений
            if ruff check whilly/ tests/ && ruff format --check whilly/ tests/; then
              git add .
              git commit -m "style: Auto-fix linting and formatting issues" \
                         -m "Automatically applied fixes via GitHub Actions" \
                         -m "Co-Authored-By: GitHub Action <action@github.com>"

              # Пушим в текущую ветку. На PR из форков или при отсутствии
              # write-прав GITHUB_TOKEN push вернёт 403 — тогда печатаем diff
              # и падаем с exit 1 (а не 128), чтобы автор применил фиксы сам.
              if [ "${{ github.event_name }}" = "pull_request" ]; then
                TARGET_REF="${{ github.head_ref }}"
              else
                TARGET_REF="${{ github.ref_name }}"
              fi

              if git push origin "HEAD:${TARGET_REF}"; then
                echo "✅ Auto-fixes pushed to branch ${TARGET_REF}"
              else
                echo "⚠️  Cannot push auto-fix commit to ${TARGET_REF}"
                echo "   (likely PR from fork or missing contents:write permission)"
                echo ""
                echo "📋 Apply this diff locally and push yourself:"
                echo "─────────────────────────────────────────────"
                git show --no-color HEAD
                echo "─────────────────────────────────────────────"
                exit 1
              fi
            else
              echo "💥 Something went wrong - code still has issues after auto-fix"
              exit 1
            fi
          fi

  arch-guard:
    name: Arch guard (import-linter + os-side-effects)
    runs-on: ubuntu-latest
    # Запускаем после lint job-а: если он сделал auto-commit фикса в
    # head_ref, нам важно проверять самый свежий срез, а не родительский.
    needs: lint
    steps:
      - uses: actions/checkout@v4
        with:
          # Подтягиваем последний коммит ветки (включая auto-fix от lint
          # job-а если он был). Шаблон зеркалит test / agent-backends jobs.
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev deps
        # Тащит import-linter из [dev] extras. Полная dev установка нужна
        # потому что lint-imports строит реальный import-graph через
        # рантайм — для контракта SC-6 это важно: транзитивный
        # `whilly.core -> X -> asyncpg` ловится только когда X тоже реально
        # импортирован.
        run: pip install -e '.[dev]'
      - name: Verify whilly.core stays pure (import-linter SC-6 contract)
        # PRD SC-6 / TC-8: whilly.core — pure domain layer, не импортирует
        # asyncpg, httpx, subprocess, fastapi, uvicorn, alembic. Контракт
        # описан в .importlinter; lint-imports вернёт exit 1 при первом
        # forbidden edge — это hard gate. Регрессия здесь означает что
        # hexagonal граница пробита и v4 архитектура потеряла ключевую
        # инвариантку.
        run: lint-imports
      - name: Verify whilly.core has no os.chdir / os.getcwd call sites
        # Belt-and-suspenders для SC-6 boundary: import-linter блокирует
        # *импорты* I/O модулей, но не видит вызовы внутри stdlib `os`
        # (который whilly.core может легитимно использовать для os.path
        # утилит). Регрессия с os.chdir() внутри pure domain layer
        # сломала бы per-task workspace isolation flow: run_plan делает
        # chdir один раз и доверяет core никогда не chdir'ить под ним
        # (см. CLAUDE.md "Don't leak cwd changes"). Этот grep —
        # статическая гарантия инварианта.
        run: |
          if grep -rnE '\bos\.(chdir|getcwd)\b' whilly/core/; then
            echo "::error::whilly/core/ contains os.chdir / os.getcwd — forbidden by SC-6"
            exit 1
          fi
          echo "OK: no os.chdir / os.getcwd in whilly.core"

  type-check:
    name: Type check (mypy --strict whilly.core)
    runs-on: ubuntu-latest
    # После lint, как и остальные jobs — чтобы auto-fix успел вмерджиться
    # в head_ref до того как мы прогоним mypy на актуальном срезе.
    needs: lint
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev deps
        run: pip install -e '.[dev]'
      - name: Run mypy --strict on whilly.core (PRD NFR-4 / TASK-031)
        # whilly.core — pure domain layer без I/O, поэтому стоит держать
        # его в strict-режиме типов: любая ошибка типизации в core
        # каскадирует через все adapter-слои выше. mypy конфиг в
        # pyproject.toml уже включает per-module strict-overrides для
        # whilly.core.* (см. [[tool.mypy.overrides]] module = "whilly.core.*"),
        # так что обычный `mypy whilly/core/` уже эквивалентен `--strict`.
        # Явный --strict оставлен для читаемости: в логе CI сразу видно,
        # что проверка строгая, без необходимости лезть в pyproject.
        run: mypy --strict whilly/core/

  test:
    name: Tests (Python 3.12 / unit + coverage)
    runs-on: ubuntu-latest
    # После lint — чтобы auto-fix фикса (если был) уже отправился в
    # head_ref. Без needs: lint мы могли бы прогонять тесты на грязном
    # срезе и видеть лишние diff'ы между runs.
    needs: lint
    steps:
      - uses: actions/checkout@v4
        with:
          # head_ref на PR подтягивает свежий коммит (включая auto-fix
          # от lint job-а), на push — текущий ref. Тот же шаблон, что в
          # arch-guard / agent-backends / type-check выше.
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev deps
        # `[dev]` рекурсивно тянет `[worker, server]` (v4 split из TASK-023)
        # плюс pytest + pytest-asyncio + testcontainers + ruff + mypy +
        # import-linter + coverage. Asyncpg, fastapi, sqlalchemy и alembic
        # приходят через server-extra и нужны: unit-тесты импортируют
        # whilly.adapters.db / whilly.adapters.transport, которые тянут
        # asyncpg / fastapi из base namespace.
        run: pip install -e '.[dev]'
      - name: Run unit tests with coverage on whilly.core
        # Resource-aware test parallelism cap (VAL-CROSS-READY-905):
        # the literal cap below is `pytest -n auto --maxprocesses=4` —
        # conservative default that protects ubuntu-latest GitHub runners
        # (7GB RAM) from OOM when each xdist worker forks its own
        # testcontainer Postgres + asyncpg pool. Override via the
        # WHILLY_PYTEST_PARALLEL env var when scaling vertically.
        #
        # Coverage measurement here intentionally stays single-process
        # (`coverage run -m pytest -q`) so the master process collects
        # whilly.core line/branch hits without the multi-process merge
        # dance — xdist is enabled in `make test` (Makefile honors
        # WHILLY_PYTEST_PARALLEL=4 by default) and in the agent-backends
        # job below where coverage isn't measured.
        #
        # `tests/unit/` — v4 unit suite (439 тестов на момент TASK-033b).
        # tests/integration/ намеренно НЕ запускаются здесь — они требуют
        # Postgres через testcontainers + Docker daemon, и это уровень
        # release-smoke (TASK-034a), а не каждой PR-валидации.
        # tests/test_*.py (v3 legacy в корне tests/) тоже не бегут —
        # часть из них зависит от внешних бинарей (opencode) и от v3
        # cli.py runtime, который заменён на cli_legacy.py + dispatcher.
        # Subset нужный для backend registry прогоняется в `agent-backends`
        # job-е ниже как явно перечисленные файлы.
        #
        # `coverage run --source=whilly/core -m pytest tests/unit/`
        # измеряет покрытие ТОЛЬКО pure domain layer'а — этого достаточно
        # для PRD NFR-4 / SC-6 / TASK-030. coverage report --fail-under=80
        # — hard gate: regression < 80% покрытия в whilly.core должна
        # ронять CI, потому что это либо новый необтестированный код в
        # домене, либо удалённые тесты.
        run: |
          coverage run --source=whilly/core -m pytest -q tests/unit/
          coverage report --fail-under=80
      - name: Upload coverage artifact (for PR review)
        # Артефакт с детальным отчётом нужен ревьюверу: процент по job'у
        # видно на checks-странице, но per-file разбивка живёт только в
        # XML/HTML, и без артефакта пришлось бы локально воспроизводить.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            .coverage
          if-no-files-found: ignore
          retention-days: 14

  agent-backends:
    name: Agent backends (OC-119)
    runs-on: ubuntu-latest
    # Запускаем после успешного линтинга
    needs: lint
    steps:
      - uses: actions/checkout@v4
        with:
          # Получаем последние изменения (включая auto-commit от lint job)
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev deps
        run: pip install -e '.[dev]'
      - name: Lint agent backend code
        run: |
          ruff check whilly/agents/ whilly/agent_runner.py whilly/decision_gate.py whilly/tmux_runner.py
          ruff format --check whilly/agents/ whilly/agent_runner.py whilly/decision_gate.py whilly/tmux_runner.py
      - name: Verify backend registry + Protocol
        run: |
          python -c "
          from whilly.agents import AgentBackend, available_backends, get_backend
          from whilly.agents.base import AgentResult, AgentUsage
          names = available_backends()
          # 'claude_handoff' is an optional, operator-driven backend. The other
          # two are the production subprocess backends covered by the rest of
          # this job's assertions.
          required = {'claude', 'opencode'}
          missing = required - set(names)
          assert not missing, 'Missing production backends: ' + str(missing) + ' (have ' + str(names) + ')'
          for n in names:
              b = get_backend(n)
              assert b.name == n
              assert callable(getattr(b, 'build_command', None))
              assert callable(getattr(b, 'run', None))
          # Shim re-exports must be the same classes
          from whilly.agent_runner import AgentResult as Shim, AgentUsage as ShimU
          assert Shim is AgentResult and ShimU is AgentUsage
          print('backend registry OK:', names)
          "
      - name: Run backend + wiring tests
        # Resource-aware test parallelism cap (VAL-CROSS-READY-905):
        # `pytest -n auto --maxprocesses=4` distributes the 4 backend
        # test files across xdist workers but caps the total at 4 to
        # protect GitHub runner memory from OOM. The conservative
        # default matches the WHILLY_PYTEST_PARALLEL convention used
        # by the Makefile `test` target.
        run: pytest -n auto --maxprocesses=4 -q tests/test_agent_backend_claude.py tests/test_agent_backend_opencode.py tests/test_decision_gate.py tests/test_whilly_error_handling.py