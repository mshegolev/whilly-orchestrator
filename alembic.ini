# Alembic configuration for Whilly v4.0 (PRD FR-2.1, FR-2.4).
#
# `script_location` points inside the package (whilly/adapters/db/migrations/)
# so migrations ship with the wheel. The DSN itself is NOT hard-coded here —
# env.py reads it from the WHILLY_DATABASE_URL environment variable (declared
# in .env.example, default points at docker-compose Postgres on 127.0.0.1:5432).

[alembic]
script_location = whilly/adapters/db/migrations
prepend_sys_path = .
version_path_separator = os
# Resolved at runtime by env.py from $WHILLY_DATABASE_URL — value here is a
# placeholder so `alembic --version`, `alembic check`, etc. don't error before
# env.py runs. NEVER point this at a real DB; env.py overrides it.
sqlalchemy.url = postgresql+asyncpg://placeholder:placeholder@localhost:5432/placeholder

# Migration filename template: NNN_<slug>.py — matches the key_files contract
# in tasks.json (e.g. 001_initial_schema.py for TASK-007).
file_template = %%(rev)s_%%(slug)s
truncate_slug_length = 60
timezone = UTC

[post_write_hooks]
# Keep generated migrations conformant with the project's ruff config so
# `make lint` stays green when contributors run `alembic revision --autogenerate`.
hooks = ruff_format,ruff_check
ruff_format.type = console_scripts
ruff_format.entrypoint = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME
ruff_check.type = console_scripts
ruff_check.entrypoint = ruff
ruff_check.options = check --fix REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
